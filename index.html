<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Gesture Shooter</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      font-family: system-ui, -apple-system, sans-serif;
    }
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      transform: scaleX(-1);
      object-fit: contain;
    }
    video {
      display: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <video autoplay playsinline></video>
    <canvas></canvas>
  </main>

  <script>
    const video = document.querySelector('video');
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    const config = {
      width: 1280,
      height: 720,
      magnetRadius: 100,
      triggerThreshold: 40,
      resetThreshold: 60,
      maxDiscs: 4
    };

    canvas.width = config.width;
    canvas.height = config.height;

    const state = {
      discs: [],
      texts: [],
      canShoot: true
    };

    const spawnDisc = () => {
      const edge = Math.floor(Math.random() * 4);
      let x, y;

      if (edge === 0) { x = Math.random() * config.width; y = 0; }
      else if (edge === 1) { x = Math.random() * config.width; y = config.height; }
      else if (edge === 2) { x = 0; y = Math.random() * config.height; }
      else { x = config.width; y = Math.random() * config.height; }

      const angle = Math.atan2(config.height / 2 - y, config.width / 2 - x);
      const speed = 3 + Math.random() * 4;

      return {
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 30
      };
    };

    for (let i = 0; i < config.maxDiscs; i++) {
      state.discs.push(spawnDisc());
    }

    const processGameLogic = (landmarks) => {
      let indexTip = null;
      let thumbTip = null;
      let indexBase = null;
      let crosshair = null;
      let target = null;

      if (landmarks) {
        indexTip = { x: landmarks[8].x * config.width, y: landmarks[8].y * config.height };
        thumbTip = { x: landmarks[4].x * config.width, y: landmarks[4].y * config.height };
        indexBase = { x: landmarks[5].x * config.width, y: landmarks[5].y * config.height };
        
        crosshair = { ...indexTip };

        for (const d of state.discs) {
          const dist = Math.hypot(d.x - indexTip.x, d.y - indexTip.y);
          if (dist < config.magnetRadius) {
            crosshair = { x: d.x, y: d.y };
            target = d;
            break;
          }
        }

        const triggerDist = Math.hypot(thumbTip.x - indexBase.x, thumbTip.y - indexBase.y);

        if (triggerDist < config.triggerThreshold && state.canShoot) {
          state.canShoot = false;
          if (target) {
            state.texts.push({ text: 'HIT!', x: crosshair.x, y: crosshair.y, life: 30, color: '#00FF00' });
            state.discs = state.discs.filter(d => d !== target);
            state.discs.push(spawnDisc());
          } else {
            state.texts.push({ text: 'MISS!', x: crosshair.x, y: crosshair.y, life: 30, color: '#FF0000' });
          }
        } else if (triggerDist > config.resetThreshold) {
          state.canShoot = true;
        }
      }

      return { indexTip, crosshair };
    };

    const drawScene = (image, pointers) => {
      ctx.save();
      ctx.clearRect(0, 0, config.width, config.height);
      ctx.drawImage(image, 0, 0, config.width, config.height);

      state.discs.forEach((d, index) => {
        d.x += d.vx;
        d.y += d.vy;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, 2 * Math.PI);
        ctx.fillStyle = '#FFA500';
        ctx.fill();

        if (Math.abs(d.x - config.width / 2) < 50 && Math.abs(d.y - config.height / 2) < 50) {
          state.discs.splice(index, 1);
          state.discs.push(spawnDisc());
        }
      });

      if (pointers.indexTip && pointers.crosshair) {
        ctx.beginPath();
        ctx.moveTo(pointers.indexTip.x, pointers.indexTip.y);
        ctx.lineTo(pointers.crosshair.x, pointers.crosshair.y);
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.7)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pointers.crosshair.x - 20, pointers.crosshair.y);
        ctx.lineTo(pointers.crosshair.x + 20, pointers.crosshair.y);
        ctx.moveTo(pointers.crosshair.x, pointers.crosshair.y - 20);
        ctx.lineTo(pointers.crosshair.x, pointers.crosshair.y + 20);
        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      state.texts.forEach((t, index) => {
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.scale(-1, 1);
        ctx.font = 'bold 48px sans-serif';
        ctx.fillStyle = t.color;
        ctx.textAlign = 'center';
        ctx.fillText(t.text, 0, 0);
        ctx.restore();

        t.y -= 2;
        t.life -= 1;
        if (t.life <= 0) state.texts.splice(index, 1);
      });

      ctx.restore();
    };

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      const landmarks = results.multiHandLandmarks?.[0] || null;
      const pointers = processGameLogic(landmarks);
      drawScene(results.image, pointers);
    });

    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: config.width,
      height: config.height
    });

    camera.start();
  </script>
</body>
</html>
