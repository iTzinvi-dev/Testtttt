<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pistol Shooter: Audited Edition</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    main { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; max-width: 100%; max-height: 100%; }
    #ui {
      position: absolute; top: 40px; left: 40px; color: #00ffcc;
      z-index: 10; pointer-events: none;
    }
    .score { font-size: 48px; font-weight: 900; line-height: 1; }
    .streak { font-size: 18px; opacity: 0.7; margin-top: 5px; letter-spacing: 1px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="ui">
    <div id="scoreDisplay" class="score">0000</div>
    <div id="streakDisplay" class="streak">STREAK: x1</div>
  </div>
  <main>
    <video autoplay playsinline style="display:none"></video>
    <canvas id="gameCanvas"></canvas>
  </main>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.querySelector('video');

    const config = {
      w: 1280, h: 720,
      magnetRadius: 120,
      flickThreshold: 22,
      maxDiscs: 4
    };

    canvas.width = config.w;
    canvas.height = config.h;

    const state = {
      score: 0,
      streak: 1,
      discs: [],
      vfx: [],
      hand: null,
      frame: null,
      canShoot: true,
      prevThumbY: 0,
      lerpAim: { x: 640, y: 360 },
      recoil: 0
    };

    const createDisc = () => {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * config.w; y = -80; }
      else if (side === 1) { x = Math.random() * config.w; y = config.h + 80; }
      else if (side === 2) { x = -80; y = Math.random() * config.h; }
      else { x = config.w + 80; y = Math.random() * config.h; }

      const angle = Math.atan2(config.h/2 - y, config.w/2 - x) + (Math.random() - 0.5) * 0.4;
      const speed = 4 + (state.score / 3000) + Math.random() * 2;
      return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r: 35 };
    };

    for(let i=0; i < config.maxDiscs; i++) state.discs.push(createDisc());

    const isPistolGesture = (lm) => {
      const indexUp = lm[8].y < lm[6].y;
      const middleDown = lm[12].y > lm[10].y;
      const ringDown = lm[16].y > lm[14].y;
      return indexUp && middleDown && ringDown;
    };

    const runGameLoop = () => {
      // Background Rendering (Mirrored)
      ctx.save();
      if (state.recoil > 0) {
        ctx.translate(0, -state.recoil);
        state.recoil *= 0.8;
      }
      ctx.translate(config.w, 0);
      ctx.scale(-1, 1);
      if (state.frame) ctx.drawImage(state.frame, 0, 0, config.w, config.h);
      ctx.restore();

      // Update & Draw Discs
      for(let i = state.discs.length - 1; i >= 0; i--) {
        const d = state.discs[i];
        d.x += d.vx;
        d.y += d.vy;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 165, 0, 0.4)';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.fill(); ctx.stroke();

        // Respawn if reached center
        if (Math.hypot(d.x - config.w/2, d.y - config.h/2) < 40) state.discs[i] = createDisc();
      }

      // Interaction Logic
      if (state.hand) {
        const lm = state.hand;
        const currentAimX = (1 - lm[8].x) * config.w;
        const currentAimY = lm[8].y * config.h;
        const thumbY = lm[4].y * config.h;

        state.lerpAim.x += (currentAimX - state.lerpAim.x) * 0.4;
        state.lerpAim.y += (currentAimY - state.lerpAim.y) * 0.4;

        let finalX = state.lerpAim.x;
        let finalY = state.lerpAim.y;
        let targetIdx = -1;

        // Aim Assist
        state.discs.forEach((d, i) => {
          if (Math.hypot(d.x - finalX, d.y - finalY) < config.magnetRadius) {
            finalX = d.x; finalY = d.y;
            targetIdx = i;
          }
        });

        if (isPistolGesture(lm)) {
          // Crosshair
          ctx.strokeStyle = '#00ffcc';
          ctx.setLineDash([5, 5]);
          ctx.beginPath(); ctx.moveTo(state.lerpAim.x, state.lerpAim.y); ctx.lineTo(finalX, finalY); ctx.stroke();
          ctx.setLineDash([]);
          ctx.lineWidth = 4;
          ctx.strokeRect(finalX - 25, finalY - 25, 50, 50);

          // Flick Trigger Logic
          const velocity = state.prevThumbY - thumbY; 
          state.prevThumbY = thumbY;

          if (velocity > config.flickThreshold && state.canShoot) {
            state.canShoot = false;
            state.recoil = 30;

            if (targetIdx !== -1) {
              const hit = state.discs[targetIdx];
              state.score += 100 * state.streak;
              state.streak++;
              state.vfx.push({ text: 'BOOM!', x: hit.x, y: hit.y, life: 20, color: '#00ffcc' });
              state.discs[targetIdx] = createDisc();
            } else {
              state.streak = 1;
              state.vfx.push({ text: 'MISS', x: finalX, y: finalY, life: 15, color: '#ff3366' });
            }
            
            document.getElementById('scoreDisplay').innerText = state.score.toString().padStart(4, '0');
            document.getElementById('streakDisplay').innerText = `STREAK: x${state.streak}`;
            
            setTimeout(() => state.canShoot = true, 300);
          }
        }
      }

      // VFX Cleanup and Render
      for(let i = state.vfx.length - 1; i >= 0; i--) {
        const v = state.vfx[i];
        v.y -= 2; v.life--;
        if (v.life <= 0) state.vfx.splice(i, 1);
        else {
          ctx.font = 'bold 36px sans-serif';
          ctx.fillStyle = v.color;
          ctx.textAlign = 'center';
          ctx.fillText(v.text, v.x, v.y);
        }
      }

      requestAnimationFrame(runGameLoop);
    };

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.8,
      minTrackingConfidence: 0.8
    });

    hands.onResults((results) => {
      state.hand = results.multiHandLandmarks?.[0] || null;
      state.frame = results.image;
    });

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: config.w, height: config.h
    });

    camera.start();
    requestAnimationFrame(runGameLoop);
  </script>
</body>
</html>
