<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Shooter: Final Audit</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
    main { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; max-width: 100%; max-height: 100%; }
    #overlay {
      position: absolute; top: 30px; left: 30px; color: #00ffcc;
      pointer-events: none; z-index: 10;
    }
    .label { font-size: 14px; opacity: 0.7; letter-spacing: 2px; }
    .value { font-size: 32px; font-weight: 900; margin-bottom: 15px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="overlay">
    <div class="label">SCORE</div>
    <div id="score" class="value">0000</div>
    <div class="label">COMBO</div>
    <div id="combo" class="value">x1</div>
  </div>
  <main>
    <video autoplay playsinline style="display:none"></video>
    <canvas id="gameCanvas"></canvas>
  </main>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.querySelector('video');
    
    const ui = {
      score: document.getElementById('score'),
      combo: document.getElementById('combo')
    };

    const config = { 
      w: 1280, h: 720, 
      magnet: 110, 
      shootDist: 35, 
      relaxDist: 55,
      maxDiscs: 4 
    };

    canvas.width = config.w;
    canvas.height = config.h;

    const state = {
      score: 0,
      combo: 1,
      discs: [],
      vfx: [],
      particles: [],
      hand: null,
      rawFrame: null,
      canShoot: true,
      lastAim: { x: config.w/2, y: config.h/2 }
    };

    const createDisc = () => {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * config.w; y = -50; }
      else if (side === 1) { x = Math.random() * config.w; y = config.h + 50; }
      else if (side === 2) { x = -50; y = Math.random() * config.h; }
      else { x = config.w + 50; y = Math.random() * config.h; }

      const angle = Math.atan2(config.h/2 - y, config.w/2 - x) + (Math.random() - 0.5) * 0.3;
      const speed = 4 + (Math.random() * 4) + (state.score / 2000);
      
      return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r: 35 };
    };

    const explode = (x, y, color) => {
      for(let i=0; i<12; i++) {
        state.particles.push({
          x, y, 
          vx: (Math.random()-0.5) * 12, 
          vy: (Math.random()-0.5) * 12,
          life: 1.0, 
          color
        });
      }
    };

    // Initialize
    for(let i=0; i<config.maxDiscs; i++) state.discs.push(createDisc());

    const loop = () => {
      // 1. Draw Background (Video)
      ctx.save();
      ctx.translate(config.w, 0);
      ctx.scale(-1, 1);
      if (state.rawFrame) ctx.drawImage(state.rawFrame, 0, 0, config.w, config.h);
      ctx.restore();

      // 2. Physics & Logic
      for(let i = state.discs.length - 1; i >= 0; i--) {
        const d = state.discs[i];
        d.x += d.vx; d.y += d.vy;
        
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 160, 0, 0.4)';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.fill(); ctx.stroke();

        if (Math.hypot(d.x - config.w/2, d.y - config.h/2) < 40) {
          state.discs[i] = createDisc();
        }
      }

      // 3. Hand Tracking Logic
      if (state.hand) {
        const index = { x: (1 - state.hand[8].x) * config.w, y: state.hand[8].y * config.h };
        const thumb = { x: (1 - state.hand[4].x) * config.w, y: state.hand[4].y * config.h };
        const base = { x: (1 - state.hand[5].x) * config.w, y: state.hand[5].y * config.h };

        state.lastAim.x += (index.x - state.lastAim.x) * 0.4;
        state.lastAim.y += (index.y - state.lastAim.y) * 0.4;

        let aimX = state.lastAim.x;
        let aimY = state.lastAim.y;
        let targetIdx = -1;

        state.discs.forEach((d, i) => {
          if (Math.hypot(d.x - aimX, d.y - aimY) < config.magnet) {
            aimX = d.x; aimY = d.y;
            targetIdx = i;
          }
        });

        // Laser & Crosshair
        ctx.beginPath();
        ctx.moveTo(state.lastAim.x, state.lastAim.y);
        ctx.lineTo(aimX, aimY);
        ctx.strokeStyle = 'rgba(0, 255, 200, 0.4)';
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = '#00ffcc';
        ctx.strokeRect(aimX - 20, aimY - 20, 40, 40);

        // Shooting
        const triggerDist = Math.hypot(thumb.x - base.x, thumb.y - base.y);
        if (triggerDist < config.shootDist && state.canShoot) {
          state.canShoot = false;
          if (targetIdx !== -1) {
            const hit = state.discs[targetIdx];
            state.score += 100 * state.combo;
            state.combo++;
            explode(hit.x, hit.y, '#00ffcc');
            state.vfx.push({ t: `+${100*state.combo-100}`, x: hit.x, y: hit.y, l: 30, c: '#00ffcc' });
            state.discs[targetIdx] = createDisc();
          } else {
            state.combo = 1;
            state.vfx.push({ t: 'MISS', x: aimX, y: aimY, l: 20, c: '#ff3366' });
          }
          ui.score.innerText = state.score.toString().padStart(4, '0');
          ui.combo.innerText = `x${state.combo}`;
        } else if (triggerDist > config.relaxDist) {
          state.canShoot = true;
        }
      }

      // 4. VFX & Particles
      for(let i = state.particles.length-1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) state.particles.splice(i, 1);
        else {
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fillRect(p.x, p.y, 5, 5);
        }
      }
      ctx.globalAlpha = 1.0;

      for(let i = state.vfx.length-1; i >= 0; i--) {
        const v = state.vfx[i];
        v.y -= 1.5; v.l--;
        if(v.l <= 0) state.vfx.splice(i, 1);
        else {
          ctx.font = 'bold 30px sans-serif';
          ctx.fillStyle = v.c;
          ctx.textAlign = 'center';
          ctx.fillText(v.t, v.x, v.y);
        }
      }

      requestAnimationFrame(loop);
    };

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
    hands.onResults(r => {
      state.hand = r.multiHandLandmarks?.[0] || null;
      state.rawFrame = r.image;
    });

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: config.w, height: config.h
    });

    camera.start();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
